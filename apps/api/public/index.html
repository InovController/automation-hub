<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Automation HUB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/styles/main.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">A</div>
          <div>
            <strong>Automation HUB</strong>
            <span>Portal de Automações</span>
          </div>
        </div>

        <nav class="menu">
          <a href="#/dashboard" data-nav="dashboard">Painel</a>
          <a href="#/robots" data-nav="robots">Robôs</a>
          <a href="#/history" data-nav="history">Execuções</a>
          <a href="#/settings" data-nav="settings">Configurações</a>
        </nav>

        <div class="sidebar-footer">
          <p>Orquestração interna para automações em Python.</p>
        </div>
      </aside>

      <main class="content">
        <header class="topbar">
          <label class="searchbox">
            <span>Buscar</span>
            <input id="searchInput" type="search" placeholder="Buscar automações..." />
          </label>
          <div class="topbar-actions">
            <button id="themeToggle" class="ghost-button theme-toggle" type="button">Tema escuro</button>
            <div class="user-chip">
              <div>
                <strong id="userName">Visitante</strong>
                <span id="userEmail">Faça login para continuar</span>
              </div>
              <div class="avatar">AR</div>
            </div>
          </div>
        </header>

        <div id="toast" class="toast hidden"></div>
        <div id="app"></div>
      </main>
    </div>

    <script type="module" src="/assets/js/app.js"></script>
  </body>
</html>
